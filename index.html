<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=ios3" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/maskable.svg?v=ios3" media="(prefers-color-scheme: dark)" />
    <link rel="manifest" href="/manifest.webmanifest?v=ios3" />
    <meta name="theme-color" content="#0A84FF" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero</title>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("zero_theme_preference_v1") || "system";
          var isDark = pref === "dark" || (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <style>
      @keyframes splashFloat {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-5px) scale(1.02); }
      }
      @keyframes splashGlow {
        0%, 100% { opacity: 0.35; transform: scale(0.95); }
        50% { opacity: 0.7; transform: scale(1.02); }
      }
      @keyframes splashShimmer {
        from { transform: translateX(-150%) skewX(-20deg); }
        to { transform: translateX(260%) skewX(-20deg); }
      }
      #zero-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 16%, #ffffffd4 0%, #ffffff00 44%),
          radial-gradient(circle at 84% 88%, #d6e7ff85 0%, #ffffff00 46%),
          linear-gradient(180deg, #f8fbff 0%, #eef4ff 52%, #e9f0fc 100%);
        transition: opacity 0.45s ease;
      }
      #zero-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      .zero-splash-wrap {
        position: relative;
        display: grid;
        place-items: center;
      }
      .zero-splash-glow {
        position: absolute;
        width: 134px;
        height: 134px;
        border-radius: 40px;
        background: radial-gradient(circle at 40% 16%, #90b8ff9e, #90b8ff00 72%);
        filter: blur(10px);
        animation: splashGlow 2.4s ease-in-out infinite;
      }
      .zero-splash-card {
        width: 108px;
        height: 108px;
        border-radius: 32px;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(145deg, #53b4ff, #0a84ff 62%, #0057d9);
        box-shadow: 0 18px 42px #2f63c33d, inset 0 1px 0 #ffffff9a;
        animation: splashFloat 2.2s ease-in-out infinite;
      }
      .zero-splash-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid #ffffff26;
      }
      .zero-splash-card::after {
        content: "";
        position: absolute;
        width: 44%;
        height: 180%;
        top: -36%;
        left: -52%;
        background: linear-gradient(180deg, #ffffff00 0%, #ffffff55 45%, #ffffff00 100%);
        animation: splashShimmer 2.7s ease-in-out infinite;
      }
      .zero-splash-logo {
        width: 52px;
        height: 52px;
        color: #f8fafc;
      }
      .zero-splash-title {
        margin: 0 0 12px;
        font-family: "SF Pro Display", "Inter", "Segoe UI", sans-serif;
        font-weight: 780;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.03em;
        text-align: center;
        color: #07132a;
        text-shadow: 0 1px 0 #ffffffcc;
      }
      .zero-splash-subtitle {
        margin: 0 0 14px;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-weight: 520;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        color: #60708b;
      }
      html[data-theme="dark"] #zero-splash {
        background:
          radial-gradient(circle at 20% 16%, #ffffff12 0%, #00000000 46%),
          radial-gradient(circle at 84% 88%, #0a84ff2d 0%, #00000000 50%),
          linear-gradient(180deg, #111217 0%, #0b0c10 58%, #090a0e 100%);
      }
      html[data-theme="dark"] .zero-splash-title {
        color: #f4f6ff;
        text-shadow: none;
      }
      html[data-theme="dark"] .zero-splash-subtitle {
        color: #8e8e93;
      }
      html[data-theme="dark"] .zero-splash-card {
        background: linear-gradient(145deg, #2a2f43, #1f2436 62%, #171b2a);
        box-shadow: 0 18px 42px #00000066, inset 0 1px 0 #ffffff22;
      }
      html[data-theme="dark"] .zero-splash-logo {
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="zero-splash" aria-hidden="true">
      <div>
        <div class="zero-splash-title">Zero</div>
        <div class="zero-splash-subtitle">Personal Finance</div>
        <div class="zero-splash-wrap">
          <div class="zero-splash-glow"></div>
          <div class="zero-splash-card">
            <svg class="zero-splash-logo" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="128" cy="136" r="58" fill="none" stroke="currentColor" stroke-width="20"/>
              <path d="M86 154l31-31 22 22 34-34" fill="none" stroke="#e9f4ff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="171" cy="111" r="8" fill="#f8fcff"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
